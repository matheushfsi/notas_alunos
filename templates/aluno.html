<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle de Faltas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">

      <a class="navbar-brand fw-bold" href="index.html">FSC</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuAluno">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuAluno">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
  <a class="nav-link" href="/inicio">Início</a>
</li>


<li class="nav-item">
  <a class="nav-link" href="/contato">Contato</a>
</li>
<li class="nav-item">
  <a class="nav-link" href="/logout">Logout</a>
</li>
        </ul>
      </div>

    </div>
  </nav>

  <header class="hero-section">
    <div class="container">

      <h1 style="align-items: center; justify-content: center;">Controle de Faltas e Notas</h1>

      <img
        src="https://media.istockphoto.com/id/958697476/pt/foto/young-unrecognisable-female-college-student-in-class-taking-notes-and-using-highlighter-focused.jpg?s=612x612&w=0&k=20&c=4B0DPg10SDEgQrB-IsQAZKcQp0fzZt0g5k5c-D5W1Xo="
        alt="Notas"
        class="hero-img img-fluid"
      >

    </div>
  </header>
<br>
  <main class="table-section">

    <div class="container">

      <div class="card border-0 shadow p-4">

        <div class="table-responsive">

          <table class="table custom-table align-middle mb-0">

            <thead>
              <tr>
                <th>Matérias</th>
                <th>Notas</th>
                <th>Faltas</th>
              </tr>
            </thead>

            <tbody>

{% for nota in notas %}

<tr>
  <td>{{ nota[0] }}</td>
  <td>{{ nota[1] }}</td>
  <td>{{ nota[2] }}</td>
</tr>

{% endfor %}

</tbody>

          </table>

        </div>

      </div>

    </div>

  </main>

  <footer class="py-4">
    <div class="container">

      <div class="footer-box d-flex justify-content-between align-items-center flex-wrap gap-3">

        <div class="d-flex align-items-center gap-3">

         

          <div>
            <h6 class="mb-0 fw-bold">Controle de Faltas e Notas</h6>
            <small>Sistema Online</small>
          </div>

        </div>

        <p class="mb-0">
          &copy; 2026 Faculdade Sem Copyright (FSC)
        </p>

      </div>

    </div>
  </footer>

</body>
</html>
