<div class="login-box">

    <h1>FSC</h1>
    <p>Faça login para continuar</p>

    <form method="POST">

        <input
            type="text"
            name="usuario"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            name="senha"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    {% if erro %}
        <p class="erro">{{ erro }}</p>
    {% endif %}

</div>
